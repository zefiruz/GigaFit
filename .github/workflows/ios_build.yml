name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Скачиваем код
        uses: actions/checkout@v4

      - name: Устанавливаем Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Скачиваем зависимости
        working-directory: ./frontend
        run: flutter pub get

      - name: Собираем iOS (без подписи)
        working-directory: ./frontend
        run: flutter build ios --release --no-codesign -v

      - name: Упаковываем в IPA для Sideloadly
        working-directory: ./frontend
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r gigafit.ipa Payload

      - name: Выдаем готовый файл
        uses: actions/upload-artifact@v4
        with:
          name: gigafit-ipa-file
          path: frontend/build/ios/iphoneos/gigafit.ipa